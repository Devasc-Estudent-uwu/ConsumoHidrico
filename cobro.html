<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Panel de Facturación</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 19.2px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      background: linear-gradient(135deg, #495057 0%, #212529 100%);
      min-height: 100vh;
      color: #e9ecef;
      overflow-x: hidden;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      background: #212529;
      padding: clamp(16px, 2.2vh, 24px) clamp(18px, 3vw, 30px);
      border-radius: 12px;
      border: 1px solid #343a40;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .logo-slot {
      width: 100%;
      min-height: 100px;
      border: 1px dashed #495057;
      border-radius: 0px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.02);
      overflow: hidden;
    }

    .logo-slot img {
      max-height: 72px;
      max-width: 100%;
      object-fit: contain;
      display: block;
    }

    .header h1 {
      color: #f8f9fa;
      font-size: clamp(24px, 3.8vw, 32px);
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1.15;
    }

    .main-content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      min-height: 0;
    }

    .card {
      background: #212529;
      padding: clamp(18px, 2.5vh, 26px);
      border-radius: 12px;
      border: 1px solid #343a40;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-title {
      color: #adb5bd;
      font-size: clamp(0.95rem, 2.2vw, 0.88rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      line-height: 1.25;
    }

    .section {
      border: 1px solid #343a40;
      border-radius: 10px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.02);
    }

    .section h2 {
      font-size: clamp(1rem, 2.6vw, 0.95rem);
      color: #f8f9fa;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: clamp(0.95rem, 2.1vw, 0.85rem);
      color: #adb5bd;
      line-height: 1.25;
    }

    input {
      width: 100%;
      border: 1px solid #495057;
      background: #1b1f23;
      color: #f8f9fa;
      border-radius: 8px;
      padding: 15px 14px;
      font-size: 16px;
      outline: none;
      line-height: 1.2;
    }

    input::placeholder {
      color: #6c757d;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .footer-actions {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 15px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 1rem;
      min-height: 50px;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #343a40;
      color: #e9ecef;
      border: 1px solid #495057;
    }

    .pay-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 12, 16, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    .pay-overlay.show {
      display: flex;
    }

    .pay-modal {
      width: min(92vw, 380px);
      background: #212529;
      border: 1px solid #343a40;
      border-radius: 18px;
      padding: 26px 20px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      animation: pop 0.28s ease-out;
    }

    .check-wrap {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      margin: 0 auto 14px;
      background: rgba(16, 185, 129, 0.12);
      border: 2px solid rgba(16, 185, 129, 0.35);
      display: grid;
      place-items: center;
    }

    .checkmark {
      width: 42px;
      height: 24px;
      border-left: 6px solid #10b981;
      border-bottom: 6px solid #10b981;
      transform: rotate(-45deg) scale(0);
      animation: draw 0.45s ease forwards 0.15s;
      border-radius: 2px;
    }

    .pay-title {
      color: #f8f9fa;
      font-size: clamp(1.3rem, 4vw, 1.15rem);
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .pay-text {
      color: #adb5bd;
      font-size: clamp(1rem, 3vw, 0.88rem);
      line-height: 1.5;
    }

    .pay-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(16, 185, 129, 0.12);
      color: #34d399;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    @keyframes pop {
      from { transform: scale(0.88); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes draw {
      to { transform: rotate(-45deg) scale(1); }
    }

    @media (max-width: 768px) {
      html {
        font-size: 16px;
      }

      .container {
        padding: 0.75rem;
        gap: 0.75rem;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .footer-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .logo-slot {
        min-height: 84px;
      }

      .header {
        padding: 16px 14px;
      }

      .card {
        padding: 16px;
      }

      .section {
        padding: 14px;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .card-title {
        font-size: 0.95rem;
      }

      .section h2 {
        font-size: 1rem;
      }

      label {
        font-size: 0.95rem;
      }

      input {
        font-size: 16px;
        padding: 15px 14px;
      }

      .btn {
        font-size: 1rem;
        min-height: 52px;
      }

      .pay-modal {
        width: min(94vw, 380px);
        padding: 24px 18px;
      }

      .pay-title {
        font-size: 1.35rem;
      }

      .pay-text {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-slot">
        <img src="logo.png" alt="Logo" />
      </div>
    </header>

    <main class="main-content">
      <section class="card">
        <div class="card-title">Datos de pago simulados</div>

        <div class="section">
          <h2>Tarjeta demo</h2>
          <div class="grid-2">
            <div class="field" style="grid-column: 1 / -1;">
              <label for="cardname">Nombre en la tarjeta</label>
              <input id="cardname" type="text" value="Juan Pérez" />
            </div>
            <div class="field" style="grid-column: 1 / -1;">
              <label for="cardnumber">Número de tarjeta de prueba</label>
              <input id="cardnumber" type="text" value="4111 1111 1111 1111" inputmode="numeric" />
            </div>
            <div class="field">
              <label for="expiry">Vencimiento</label>
              <input id="expiry" type="text" value="12/29" />
            </div>
            <div class="field">
              <label for="cvv">CVV</label>
              <input id="cvv" type="password" value="123" />
            </div>
          </div>
        </div>

        <div class="section">
          <h2>Datos de domicilio demo</h2>
          <div class="grid-2">
            <div class="field" style="grid-column: 1 / -1;">
              <label for="address">Dirección</label>
              <input id="address" type="text" value="Av. Providencia 1234, Depto 56" />
            </div>
            <div class="field">
              <label for="city">Ciudad</label>
              <input id="city" type="text" value="Santiago" />
            </div>
            <div class="field">
              <label for="zip">Código postal</label>
              <input id="zip" type="text" value="7500000" />
            </div>
          </div>
        </div>

        <div class="footer-actions">
          <button id="payBtn" class="btn btn-primary" type="button">Pagar</button>
          <button class="btn btn-secondary" type="button">Cancelar</button>
        </div>
      </section>
    </main>
  </div>

  <div id="payOverlay" class="pay-overlay" aria-hidden="true">
    <div class="pay-modal" role="dialog" aria-modal="true">
      <div class="check-wrap">
        <div class="checkmark"></div>
      </div>
      <div class="pay-title" id="modalTitle">Pago completado</div>
      <div class="pay-text" id="modalText">Tu pago fue procesado correctamente. Conectando con el servidor...</div>
      <div class="pay-badge" id="modalBadge">Solicitando<br>Restablecimiento del servicio</div>
    </div>
  </div>

  <!-- Scripts de Firebase (Versión de Compatibilidad para uso directo en HTML) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // ==========================================
    // CONFIGURACIÓN DE FIREBASE (Completa aquí)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBeXR9-IHVIMwP0lZdVNj6Ml4JPeMAvDPI",
      databaseURL: "https://heltec-write-default-rtdb.firebaseio.com",
      // Puedes añadir authDomain o projectId si tu base de datos lo requiere por reglas de seguridad
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Elementos del DOM
    const payBtn = document.getElementById('payBtn');
    const overlay = document.getElementById('payOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalBadge = document.getElementById('modalBadge');

    payBtn.addEventListener('click', () => {
      // 1. Deshabilitar botón y mostrar la ventana de éxito inmediato del pago
      payBtn.disabled = true;
      
      // Restablecer textos del modal por si se ejecuta más de una vez
      modalTitle.innerText = "Pago completado";
      modalText.innerText = "Tu pago fue procesado...";
      modalBadge.innerText = "Solicitando Restablecimiento del servicio";
      modalBadge.style.background = "rgba(245, 158, 11, 0.12)"; // Color naranja intermitente
      modalBadge.style.color = "#fbbf24";

      overlay.classList.add('show');
      overlay.setAttribute('aria-hidden', 'false');

      // 2. Iniciar el Delay de 20 segundos antes de interactuar con Firebase
      setTimeout(() => {
        
        // Actualizar el valor del relé/comando en la Realtime Database
        // Nota: Cambia 'rele/comando' por la ruta exacta de tu base de datos
        database.ref('rele/comando').set(1)
          .then(() => {
            // Éxito al actualizar Firebase
            modalTitle.innerText = "¡Servicio Restablecido!";
            modalText.innerText = "Gracias por escojernos :3";
            modalBadge.innerText = "Confirmado";
            modalBadge.style.background = "rgba(16, 185, 129, 0.12)"; // Volver a verde exitoso
            modalBadge.style.color = "#34d399";
            
            // Ocultar de manera automática el modal 5 segundos después de la actualización exitosa
            setTimeout(() => {
              overlay.classList.remove('show');
              overlay.setAttribute('aria-hidden', 'true');
              payBtn.disabled = false;
            }, 50000);
          })
          .catch((error) => {
            // Manejo de errores por si fallan las credenciales o reglas de Firebase
            console.error("Error al actualizar Firebase:", error);
            modalTitle.innerText = "Error de conexión";
            modalText.innerText = "El pago se realizó pero no pudimos conectar con el relé: " + error.message;
            modalBadge.innerText = "Fallo";
            modalBadge.style.background = "rgba(239, 68, 68, 0.12)";
            modalBadge.style.color = "#f87171";
            
            setTimeout(() => {
              overlay.classList.remove('show');
              overlay.setAttribute('aria-hidden', 'true');
              payBtn.disabled = false;
            }, 6000);
          });

      }, 10000); // 20000 milisegundos = 20 segundos de retraso pedido
    });
  </script>
</body>
</html>
