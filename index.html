<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Control y Monitoreo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 19.2px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
            background: linear-gradient(135deg, #495057 0%, #212529 100%);
            height: 100vh;
            overflow: hidden;
            color: #e9ecef;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1rem;
            min-height: 0;
        }

        .header {
            background: #212529;
            padding: clamp(16px, 2vh, 24px) clamp(20px, 3vw, 32px);
            border-radius: 10px;
            border: 1px solid #343a40;
            flex-shrink: 0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        .header h1 {
            color: #f8f9fa;
            font-size: clamp(21.6px, 3vw, 28.8px);
            font-weight: 600;
            letter-spacing: -0.025em;
            text-align: center;
            flex: 1;
        }

        .header-buttons {
            position: absolute;
            right: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .button-separator {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 5px;
        }

        .fullscreen-btn,
        .download-btn {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid #343a40;
            border-radius: 8px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            gap: 6px;
            padding: 0 12px;
            flex-shrink: 0;
        }

        .download-btn {
            background: rgba(16, 185, 129, 0.15);
        }

        .fullscreen-btn:hover,
        .download-btn:hover {
            background: rgba(59, 130, 246, 0.25);
            border-color: #495057;
            transform: translateY(-2px);
        }

        .download-btn:hover {
            background: rgba(16, 185, 129, 0.25);
            border-color: #10b981;
        }

        .fullscreen-btn svg,
        .download-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            flex-shrink: 0;
        }

        .fullscreen-btn svg {
            stroke: #3b82f6;
        }

        .download-btn svg {
            stroke: #10b981;
        }

        .download-btn-text {
            color: #10b981;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr 2fr;
            gap: 1rem;
            min-height: 0;
        }

        .card {
            background: #212529;
            padding: clamp(16px, 2vh, 24px);
            border-radius: 10px;
            border: 1px solid #343a40;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
        }

        .card:hover {
            border-color: #495057;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: clamp(12px, 2vh, 20px);
            min-width: 0;
        }

        .card-title {
            color: #adb5bd;
            font-size: clamp(32px, 1.44vw, 15.6px);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .card-icon {
            width: clamp(128px, 4vw, 40px);
            height: clamp(128px, 4vw, 40px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(59, 130, 246, 0.15);
            flex-shrink: 0;
        }

        .card-icon svg {
            width: clamp(64px, 2vw, 20px);
            height: clamp(64px, 2vw, 20px);
            stroke: #3b82f6;
            fill: none;
            stroke-width: 2;
        }

        .card-icon.blue { background: rgba(59, 130, 246, 0.15); }
        .card-icon.green { background: rgba(16, 185, 129, 0.15); }
        .card-icon.green svg { stroke: #10b981; }
        .card-icon.purple { background: rgba(139, 92, 246, 0.15); }
        .card-icon.purple svg { stroke: #8b5cf6; }
        .card-icon.red { background: rgba(239, 68, 68, 0.15); }
        .card-icon.red svg { stroke: #ef4444; }

        .card-value {
            font-size: clamp(48px, 8vw, 72px);
            font-weight: 700;
            color: #f8f9fa;
            margin: clamp(4px, 1vh, 8px) 0;
            letter-spacing: -0.025em;
            flex: 1;
            display: flex;
            align-items: center;
            line-height: 1;
            min-height: 0;
        }

        .card-unit {
            color: #6c757d;
            font-size: clamp(40px, 2.16vw, 19.2px);
            font-weight: 500;
            margin-left: 4px;
        }

        .card-subtitle {
            color: #6c757d;
            font-size: clamp(25px, 1.2vw, 14.4px);
            margin-top: 20px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: clamp(28px, 1.5vh, 12px);
        }

        .status-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        .status-dot.conectado {
            background: #10b981;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }

        .status-dot.desconectado {
            background: #ef4444;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        }

        .status-text {
            color: #adb5bd;
            font-size: clamp(32px, 1.44vw, 15.6px);
            font-weight: 500;
        }

        .charts-section {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            min-height: 0;
        }

        .chart-card,
        .control-card {
            background: #212529;
            padding: clamp(16px, 2.5vh, 28px);
            border-radius: 10px;
            border: 1px solid #343a40;
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
        }

        .chart-header,
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(11px, 2vh, 20px);
            flex-shrink: 0;
        }

        .chart-header h2,
        .control-header h2 {
            color: #f8f9fa;
            font-size: clamp(32px, 2.4vw, 21.6px);
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .chart-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chart-value {
            text-align: right;
        }

        .chart-value-number {
            font-size: clamp(50px, 3.6vw, 33.6px);
            font-weight: 700;
            color: #3b82f6;
            line-height: 1;
        }

        .chart-value-label {
            font-size: clamp(24px, 1.2vw, 13.2px);
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }

        #chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .control-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
        }

        .control-block {
            background: #1d2227;
            border: 1px solid #343a40;
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-block-title {
            color: #adb5bd;
            font-size: clamp(32px, 1.44vw, 15.6px);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .65rem 0;
            border-bottom: 1px solid #2c2f33;
            gap: 1rem;
        }

        .row:last-child {
            border-bottom: none;
        }

        .row-label {
            color: #adb5bd;
            font-size: clamp(28px, 1.1vw, 14px);
            line-height: 1.2;
        }

        .switch {
            position: relative;
            width: 52px;
            height: 30px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #343a40;
            border-radius: 999px;
            transition: background .50s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            left: 4px;
            top: 4px;
            background: #fff;
            border-radius: 50%;
            transition: transform .25s;
            box-shadow: 0 1px 3px rgba(0,0,0,.3);
        }

        .switch input:checked + .slider {
            background: #10b981;
        }

        .switch input:checked + .slider::before {
            transform: translateX(24px);
        }

        .btn-factura {
            width: 100%;
            padding: .85rem;
            background: rgba(139, 92, 246, .15);
            border: 1px solid rgba(139, 92, 246, .4);
            border-radius: 8px;
            color: #a78bfa;
            font-size: clamp(28px, 1vw, 13px);
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-factura:hover {
            background: rgba(139, 92, 246, .25);
            border-color: #8b5cf6;
        }

        .note {
            font-size: clamp(24px, .9vw, 12px);
            color: #6c757d;
            margin-top: .25rem;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        @media (max-width: 1200px) {
            html { font-size: 18px; }

            .main-content {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto auto;
            }

            .charts-section {
                grid-column: 1 / -1;
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            html { font-size: 16.8px; }

            body {
                overflow: auto;
            }

            .container {
                height: auto;
                min-height: 100vh;
                padding: 0.75rem;
                gap: 0.75rem;
            }

            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(3, auto) auto;
                overflow: visible;
            }

            .header-buttons {
                right: 12px;
                gap: 8px;
                flex-wrap: wrap;
            }

            .fullscreen-btn,
            .download-btn {
                height: 36px;
                padding: 0 10px;
            }

            .fullscreen-btn svg,
            .download-btn svg {
                width: 18px;
                height: 18px;
            }

            .download-btn-text {
                font-size: 11px;
            }

            .button-separator {
                height: 20px;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }

            .row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dashboard - Medición de Consumo Hídrico</h1>
            <div class="header-buttons">
                <button class="download-btn" id="downloadBtn" title="Descargar datos en CSV">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path>
                    </svg>
                    <span class="download-btn-text">Descargar informe</span>
                </button>
                <div class="button-separator"></div>
                <button class="fullscreen-btn" id="fullscreenBtn" title="Pantalla completa">
                    <svg viewBox="0 0 24 24" id="fullscreenIcon">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Consumo Total</div>
                    <div class="card-icon blue">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                        </svg>
                    </div>
                </div>
                <div class="card-value">
                    <span id="consumoValue">--</span>
                    <span class="card-unit">L</span>
                </div>
                <div class="card-subtitle">Desde la instalación</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">RSSI Gateway LoRa</div>
                    <div class="card-icon purple">
                        <svg viewBox="0 0 24 24">
                            <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                            <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                            <circle cx="12" cy="20" r="1"></circle>
                        </svg>
                    </div>
                </div>
                <div class="card-value">
                    <span id="rssiValue">--</span>
                    <span class="card-unit">dBm</span>
                </div>
                <div class="card-subtitle" id="rssiQuality">Evaluando calidad...</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Estado del Sistema</div>
                    <div class="card-icon" id="conexionIcon">
                        <svg viewBox="0 0 24 24">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                        </svg>
                    </div>
                </div>
                <div class="card-value" style="font-size: clamp(36px, 6vw, 48px);" id="conexionText">--</div>
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <div class="status-text" id="statusText">Verificando...</div>
                </div>
            </div>

            <div class="charts-section">
                <div class="control-card">
                    <div class="control-header">
                        <h2>Panel de Control</h2>
                    </div>
                    <div class="control-grid">
                        <div class="control-block">
                            <div class="control-block-title">Corte del servicio</div>
                            <div class="row">
                                <span class="row-label">Accionamiento</span>
                                <label class="switch">
                                    <input type="checkbox" id="relay-toggle" />
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="control-block">
                            <div class="control-block-title">Notificaciones</div>
                            <div class="row" style="flex-direction:column;align-items:stretch;gap:.6rem;border-bottom:none;">
                                <button class="btn-factura" id="btn-factura">Enviar correo de facturación</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h2>Historial de Flujo</h2>
                        <div class="chart-info">
                            <div class="chart-value">
                                <div class="chart-value-number">
                                    <span id="flujoChartValue">--</span>
                                </div>
                                <div class="chart-value-label">Flujo Actual (L/min)</div>
                            </div>
                        </div>
                    </div>
                    <div id="chart-container">
                        <canvas id="flowChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <script>
        const firebaseConfigMonitoreo = {
            apiKey: "AIzaSyB9CV849RYPE4BqKBzwPlPIipiw1Wz5Tag",
            authDomain: "TU_PROYECTO_MONITOREO.firebaseapp.com",
            databaseURL: "https://heltec-read-default-rtdb.firebaseio.com/",
            projectId: "TU_PROYECTO_MONITOREO",
            storageBucket: "TU_PROYECTO_MONITOREO.appspot.com",
            messagingSenderId: "123456789",
            appId: "TU_APP_ID_MONITOREO"
        };

        const firebaseConfigControl = {
            apiKey: "AIzaSyBeXR9-IHVIMwP0lZdVNj6Ml4JPeMAvDPI",
            authDomain: "TU_PROYECTO_CONTROL.firebaseapp.com",
            databaseURL: "https://heltec-write-default-rtdb.firebaseio.com",
            projectId: "TU_PROYECTO_CONTROL",
            storageBucket: "TU_PROYECTO_CONTROL.appspot.com",
            messagingSenderId: "987654321",
            appId: "TU_APP_ID_CONTROL"
        };

        const appMonitoreo = firebase.initializeApp(firebaseConfigMonitoreo, 'monitoreo');
        const appControl = firebase.initializeApp(firebaseConfigControl, 'control');

        const databaseMonitoreo = appMonitoreo.database();
        const databaseControl = appControl.database();

        const datosRef = databaseMonitoreo.ref('/datos');
        const refComando = databaseControl.ref('/rele/comando');
        const refFacturacion = databaseControl.ref('/correo/facturacion');

        let flowChart;
        let weeklyChart;
        const maxDataPoints = 20;

        const chartData = {
            labels: [],
            datasets: [{
                label: 'Flujo (L/min)',
                data: [],
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.08)',
                tension: 0.4,
                fill: true,
                borderWidth: 2.5,
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#3b82f6',
                pointBorderColor: '#212529',
                pointBorderWidth: 2,
                pointHoverBackgroundColor: '#3b82f6',
                pointHoverBorderColor: '#f8f9fa',
                pointHoverBorderWidth: 2
            }]
        };

        const weeklyData = {
            labels: ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'],
            datasets: [{
                label: 'Consumo (L)',
                data: [0, 0, 0, 0, 0, 0, 0],
                backgroundColor: [
                    'rgba(59, 130, 246, 0.8)',
                    'rgba(139, 92, 246, 0.8)',
                    'rgba(16, 185, 129, 0.8)',
                    'rgba(245, 158, 11, 0.8)',
                    'rgba(239, 68, 68, 0.8)',
                    'rgba(236, 72, 153, 0.8)',
                    'rgba(59, 130, 246, 0.6)'
                ],
                borderColor: [
                    '#3b82f6',
                    '#8b5cf6',
                    '#10b981',
                    '#f59e0b',
                    '#ef4444',
                    '#ec4891',
                    '#3b82f6'
                ],
                borderWidth: 2,
                borderRadius: 8,
                hoverBackgroundColor: [
                    'rgba(59, 130, 246, 1)',
                    'rgba(139, 92, 246, 1)',
                    'rgba(16, 185, 129, 1)',
                    'rgba(245, 158, 11, 1)',
                    'rgba(239, 68, 68, 1)',
                    'rgba(236, 72, 153, 1)',
                    'rgba(59, 130, 246, 0.8)'
                ]
            }]
        };

        let allData = [];

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = document.getElementById('fullscreenIcon');

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.error(`Error: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        }

        function updateFullscreenIcon() {
            if (document.fullscreenElement) {
                fullscreenIcon.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>';
            } else {
                fullscreenIcon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>';
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('fullscreenchange', updateFullscreenIcon);

        const downloadBtn = document.getElementById('downloadBtn');

        function downloadCSV() {
            if (allData.length === 0) {
                alert('No hay datos para descargar aún');
                return;
            }

            const headers = ['Fecha', 'Hora', 'Flujo (L/min)', 'Consumo Total (L)', 'RSSI (dBm)', 'Conexión'];
            const rows = allData.map(item => [
                item.fecha,
                item.hora,
                item.flujo,
                item.consumoTotal,
                item.rssi,
                item.conexion
            ]);

            const csvContent = [
                headers.join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            const now = new Date();
            const timestamp = now.toISOString().replace(/[:.]/g, '-').split('T')[0] + '_' + now.toTimeString().split(' ')[0].replace(/:/g, '-');
            const filename = `Reporte_Consumo_Hidrico_${timestamp}.csv`;

            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        downloadBtn.addEventListener('click', downloadCSV);

        function initCharts() {
            const flowCanvas = document.getElementById('flowChart');
            if (flowCanvas) {
                const ctx = flowCanvas.getContext('2d');
                flowChart = new Chart(ctx, {
                    type: 'line',
                    data: chartData,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 800, easing: 'easeInOutQuart' },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#212529',
                                titleColor: '#f8f9fa',
                                bodyColor: '#dee2e6',
                                borderColor: '#495057',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: false,
                                caretPadding: 10,
                                callbacks: {
                                    label: (context) => `${context.parsed.y.toFixed(2)} L/min`
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: '#343a40', drawBorder: false },
                                ticks: { color: '#6c757d', font: { size: 28 }, padding: 8 },
                                title: { display: true, text: 'L/min', color: '#adb5bd', font: { size: 24, weight: 500 } }
                            },
                            x: {
                                grid: { color: '#343a40', drawBorder: false },
                                ticks: { color: '#6c757d', font: { size: 32 }, maxRotation: 0, padding: 8 }
                            }
                        },
                        interaction: { intersect: false, mode: 'index' }
                    }
                });
            }

            const weeklyCanvas = document.getElementById('weeklyChart');
            if (weeklyCanvas) {
                const ctx = weeklyCanvas.getContext('2d');
                weeklyChart = new Chart(ctx, {
                    type: 'bar',
                    data: weeklyData,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 800, easing: 'easeInOutQuart' },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#212529',
                                titleColor: '#f8f9fa',
                                bodyColor: '#dee2e6',
                                borderColor: '#495057',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: false,
                                caretPadding: 10,
                                callbacks: {
                                    label: (context) => `${context.parsed.y.toFixed(2)} L`
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: '#343a40', drawBorder: false },
                                ticks: { color: '#6c757d', font: { size: 28 }, padding: 8 },
                                title: { display: true, text: 'Consumo (L)', color: '#adb5bd', font: { size: 24, weight: 500 } }
                            },
                            x: {
                                grid: { display: false, drawBorder: false },
                                ticks: { color: '#6c757d', font: { size: 24 }, maxRotation: 0, padding: 8 }
                            }
                        },
                        interaction: { intersect: false, mode: 'index' }
                    }
                });
            }
        }

        function updateFlowChart(flujo) {
            if (!flowChart) return;

            const now = new Date();
            const timeLabel = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

            chartData.labels.push(timeLabel);
            chartData.datasets[0].data.push(flujo);

            if (chartData.labels.length > maxDataPoints) {
                chartData.labels.shift();
                chartData.datasets[0].data.shift();
            }

            flowChart.update();
        }

        function updateWeeklyChart(datosConsulta) {
            if (!weeklyChart) return;

            weeklyData.datasets[0].data = [
                datosConsulta.ConsumoLLunes || 0,
                datosConsulta.ConsumoMartes || 0,
                datosConsulta.ConsumoMiercoles || 0,
                datosConsulta.ConsumoJueves || 0,
                datosConsulta.ConsumoViernes || 0,
                datosConsulta.ConsumoSabado || 0,
                datosConsulta.ConsumoTDomingo || 0
            ];

            weeklyChart.update();
        }

        function evaluarRSSI(rssi) {
            if (rssi >= -50) return { text: 'Excelente', color: '#10b981' };
            if (rssi >= -70) return { text: 'Buena', color: '#3b82f6' };
            if (rssi >= -90) return { text: 'Regular', color: '#f59e0b' };
            return { text: 'Débil', color: '#ef4444' };
        }

        function conectarControles() {
            const toggle = document.getElementById('relay-toggle');
            const btnFactura = document.getElementById('btn-factura');

            toggle.addEventListener('change', function () {
                refComando.set(toggle.checked ? 1 : 0);
            });

            btnFactura.addEventListener('click', function () {
                refFacturacion.set(1);
            });
        }

        datosRef.on('value', (snapshot) => {
            const datos = snapshot.val();

            if (datos) {
                document.getElementById('flujoChartValue').textContent = Number(datos.flujo || 0).toFixed(2);
                document.getElementById('consumoValue').textContent = Number(datos.consumoTotal || 0).toFixed(2);

                document.getElementById('rssiValue').textContent = datos.rssi;
                const rssiInfo = evaluarRSSI(datos.rssi);
                const rssiQuality = document.getElementById('rssiQuality');
                rssiQuality.textContent = `Calidad: ${rssiInfo.text}`;
                rssiQuality.style.color = rssiInfo.color;

                const conexionIcon = document.getElementById('conexionIcon');
                const conexionText = document.getElementById('conexionText');
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');

                let conexionEstado = 'Desconectado';
                if (datos.conexionActiva) {
                    conexionIcon.className = 'card-icon green';
                    conexionText.textContent = 'Conectado';
                    conexionText.style.color = '#10b981';
                    statusDot.className = 'status-dot conectado';
                    statusText.textContent = 'Transmisor activo';
                    conexionEstado = 'Conectado';
                } else {
                    conexionIcon.className = 'card-icon red';
                    conexionText.textContent = 'Desconectado';
                    conexionText.style.color = '#ef4444';
                    statusDot.className = 'status-dot desconectado';
                    statusText.textContent = 'Sin señal del transmisor';
                }

                const now = new Date();
                const fecha = now.toLocaleDateString('es-ES', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });
                const hora = now.toLocaleTimeString('es-ES', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                allData.push({
                    fecha: fecha,
                    hora: hora,
                    flujo: Number(datos.flujo || 0).toFixed(2),
                    consumoTotal: Number(datos.consumoTotal || 0).toFixed(2),
                    rssi: datos.rssi ?? 0,
                    conexion: conexionEstado
                });

                updateFlowChart(Number(datos.flujo || 0));
                updateWeeklyChart(datos);
            }
        });

        window.addEventListener('load', () => {
            initCharts();
            conectarControles();
        });
    </script>
</body>
</html>
